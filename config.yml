baseURL: "https://michalbaran.pl/"
theme: "hugo-theme-terminalcv"
title: "MichalBaran.pl"
languageCode: "en-us"

params:
  version: "2.0.0"
  description: "My terminal cv"
  blog: 
    enabled: true
    lsClassic: true
  prompt:
    core:
      text: "user@terminalCV"
      color: "pink"
      before: "["
      beforeColor: "red"
      after: '\]'
      afterColor: "red"
      # separator: '-'
    separator:
      text: "-"
      # color:
    path:
      before: "["
      beforeColor: "red"
      text: "~/terminalcv"
      color: "blue"
      after: '\]'
      afterColor: "red"
    extra:
      text: ": "
      color: "orange"

  # promptColor: grey
  # promptSimbols: ":~$"
  # promptSimbolsColor: grey
  # startxLocation: https://example.com
  # useLess: true
  #customCSS: true
  listLS: true
  #exitLocation: "about:blank"
  exitMessage: "[Session completed, the browserwindow can be safely closed]"
  source: true
  #use a ‎ (blank character) if your first character of the ascii art is a whitespace
  greetingbannercolor: white
  greetingbanner: |
    ‎ '||\   /||`            '||             '||` '||'''|,                                             '||` 
    ‎  ||\\.//||   ''         ||              ||   ||   ||                                              ||  
    ‎  ||     ||   ||  .|'',  ||''|,  '''|.   ||   ||;;;;    '''|.  '||''|  '''|.  `||''|,     '||''|,  ||  
    ‎  ||     ||   ||  ||     ||  || .|''||   ||   ||   ||  .|''||   ||    .|''||   ||  ||      ||  ||  ||  
    ‎ .||     ||. .||. `|..' .||  || `|..||. .||. .||...|'  `|..||. .||.   `|..||. .||  ||. ..  ||..|' .||. 
    ‎                                                                                           ||          
    ‎                                                                                          .||                                                                                                       

  greeting: |
    Type 'help' for a list of available commands

  bootsequence: |
    Copyright 2024, 2025
    TerminalCV. MIT License (MIT)
    https://github.com/coolapso/hugo-theme-terminalcv
    [CloudOSBoot1]: ready
    [CloudOSBoot2]: ready
    [Webserver]: ready 
    [HUGO]: ready
    [TerminalCV]: ready

    Boot Complete, accepting user input.

